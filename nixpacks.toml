# Nixpacks build configuration for Syner Cortex

[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python -m venv .venv && .venv/bin/pip install -r requirements.txt",
  "npm install --prefix frontend"
]

[phases.build]
cmds = [
  "npm run build --prefix frontend"
]

[start]
cmd = ".venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT"
# Ensure the startup runs in the virtualenv
runImage = "ubuntu-22.04"
